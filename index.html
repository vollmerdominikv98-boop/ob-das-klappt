<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Schnittwertrechner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>CNC Schnittwertrechner</h1>
            <div class="stepper">
                <div class="step-indicator" id="ind1">1 <span>Werkstoff</span></div>
                <div class="step-indicator" id="ind2">2 <span>Werkzeug</span></div>
                <div class="step-indicator" id="ind3">3 <span>Prozess</span></div>
                <div class="step-indicator" id="ind4">4 <span>Ergebnis</span></div>
            </div>
        </header>

        <main id="step-content">
            <!-- Inhalt wird hier durch script.js geladen -->
        </main>

        <footer class="controls">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Zurück</button>
            <button id="nextBtn" onclick="changeStep(1)" disabled>Weiter</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>

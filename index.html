<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>CNC Profi-Rechner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>CNC Profi-Rechner</h1>
                <div>
                    <button onclick="toggleTheme()" class="icon-btn">🌙/☀️</button>
                    <button onclick="openAdmin()" class="icon-btn">⚙️ Admin</button>
                </div>
            </div>
            <div class="stepper" id="stepper">
                <div class="step-indicator" id="ind1">1. Werkstoff</div>
                <div class="step-indicator" id="ind2">2. Art</div>
                <div class="step-indicator" id="ind3">3. Werkzeug</div>
                <div class="step-indicator" id="ind4">4. Prozess</div>
                <div class="step-indicator" id="ind5">5. Ergebnis</div>
            </div>
        </header>

        <main id="step-content">
            <!-- Inhalt wird dynamisch geladen -->
        </main>

        <footer class="controls">
            <button id="prevBtn" onclick="changeStep(-1)" disabled>Zurück</button>
            <button id="nextBtn" onclick="changeStep(1)" disabled>Weiter</button>
        </footer>
    </div>

    <!-- Versteckter Datei-Input für Backups -->
    <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">

    <!-- Admin Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Admin-Konsole</h2>
                <button onclick="closeAdmin()" class="close-btn">✖</button>
            </div>
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchTab('matTab')">Werkstoffe</button>
                <button class="tab-btn" onclick="switchTab('catTab')">Kategorien</button>
                <button class="tab-btn" onclick="switchTab('toolTab')">Werkzeuge</button>
                <button class="tab-btn" onclick="switchTab('profTab')">Profile</button>
                <button class="tab-btn" onclick="switchTab('backupTab')">💾 Backup</button>
            </div>
            
            <div id="admin-form-container">
                <!-- Dynamisches Formular kommt hier rein -->
            </div>
            <hr id="admin-hr">
            <h3 id="admin-list-title">Vorhandene Einträge</h3>
            <div id="admin-list">
                <!-- Liste zum Löschen -->
            </div>
            <div style="margin-top: 20px; text-align: right;">
                <button onclick="factoryReset()" style="background: #e74c3c;">Auf Standard zurücksetzen</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
